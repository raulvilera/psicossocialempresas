<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Login — S Psicos</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --g: #0072ff;
      --gb: #00d2ff;
      --bg: #000000;
      --card: #050c1a;
      --bdr: rgba(0, 162, 255, .15);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      overflow-y: auto;
      padding: 20px;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(0, 114, 255, .08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(0, 162, 255, .06) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 85%, rgba(0, 80, 162, .05) 0%, transparent 40%);
    }

    /* grade de fundo */
    .bg-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(0, 162, 255, .025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 162, 255, .025) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    /* partículas */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      background: rgba(0, 114, 255, .15);
      animation: float linear infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) scale(0)
      }

      100% {
        transform: translateY(-10vh) scale(1);
        opacity: 0
      }
    }

    /* card */
    .card {
      position: relative;
      z-index: 1;
      background: linear-gradient(145deg, #050c1a, #0a1020);
      border: 1px solid var(--bdr);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 0 60px rgba(0, 114, 255, .08), 0 30px 60px rgba(0, 0, 0, .6), inset 0 1px 0 rgba(0, 162, 255, .1);
      animation: slideUp .5s ease both;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 25px;
      background: linear-gradient(135deg, rgba(0, 114, 255, .18), transparent 50%, rgba(0, 162, 255, .08));
      z-index: -1;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(24px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* logo */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
      gap: 0
    }

    .logo-icon {
      width: 76px;
      height: 76px;
      background: linear-gradient(135deg, #001020, #001f3f);
      border: 2px solid rgba(0, 162, 255, .3);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      margin-bottom: 16px;
      box-shadow: 0 0 24px rgba(0, 114, 255, .15), inset 0 1px 0 rgba(0, 162, 255, .1);
    }

    .logo-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1.5px
    }

    .logo-sub {
      color: rgba(0, 162, 255, .55);
      font-size: 12px;
      margin-top: 4px;
      letter-spacing: .5px
    }

    /* role tabs */
    .role-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      margin-bottom: 26px;
      padding: 5px;
      background: rgba(0, 0, 0, .3);
      border-radius: 12px;
      border: 1px solid var(--bdr)
    }

    .role-tab {
      padding: 9px 4px;
      text-align: center;
      cursor: pointer;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      color: rgba(255, 255, 255, .35);
      letter-spacing: .8px;
      text-transform: uppercase;
      transition: all .2s;
      user-select: none;
    }

    .role-tab.active {
      background: linear-gradient(135deg, #001f3f, #003366);
      color: #00d2ff;
      box-shadow: 0 2px 8px rgba(0, 114, 255, .2)
    }

    .role-tab .r-icon {
      display: block;
      font-size: 16px;
      margin-bottom: 3px
    }

    /* mensagem */
    .msg {
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      display: none
    }

    .msg.error {
      background: rgba(200, 0, 0, .2);
      color: #ff6060;
      border: 1px solid rgba(200, 0, 0, .3)
    }

    .msg.success {
      background: rgba(0, 114, 255, .15);
      color: #00d2ff;
      border: 1px solid rgba(0, 114, 255, .3)
    }

    /* fields */
    .field {
      margin-bottom: 18px
    }

    label {
      font-size: 11px;
      font-weight: 700;
      color: rgba(0, 162, 255, .7);
      display: block;
      margin-bottom: 7px;
      letter-spacing: 1px;
      text-transform: uppercase
    }

    .input-wrap {
      position: relative;
      background: rgba(0, 0, 0, .4);
      border: 1px solid rgba(0, 162, 255, .18);
      border-radius: 12px;
      display: flex;
      align-items: center;
      transition: border-color .2s, box-shadow .2s;
    }

    .input-wrap:focus-within {
      border-color: rgba(0, 162, 255, .5);
      box-shadow: 0 0 0 3px rgba(0, 162, 255, .07), 0 0 18px rgba(0, 162, 255, .1)
    }

    .input-icon {
      position: absolute;
      left: 14px;
      color: rgba(0, 162, 255, .4);
      flex-shrink: 0
    }

    .input-wrap input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      background: transparent;
      border: none;
      outline: none;
      font-size: 15px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
    }

    .input-wrap input::placeholder {
      color: rgba(255, 255, 255, .18)
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      cursor: pointer;
      color: rgba(0, 162, 255, .4);
      background: none;
      border: none;
      font-size: 16px;
      transition: color .15s
    }

    .toggle-pw:hover {
      color: #00d2ff
    }

    .forgot {
      text-align: right;
      margin-top: 6px;
      margin-bottom: 22px
    }

    .forgot a {
      color: rgba(0, 162, 255, .55);
      font-size: 12px;
      text-decoration: none;
      transition: color .15s
    }

    .forgot a:hover {
      color: #00d2ff
    }

    /* botão */
    .btn-primary {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #001f3f, #004c99, #0072ff);
      color: #00d2ff;
      border: 1px solid rgba(0, 162, 255, .4);
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all .25s;
      box-shadow: 0 4px 20px rgba(0, 114, 255, .3), inset 0 1px 0 rgba(0, 162, 255, .2);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 114, 255, .45);
      color: #fff
    }

    .btn-primary:active {
      transform: translateY(1px);
      box-shadow: 0 2px 10px rgba(0, 114, 255, .2), inset 0 2px 4px rgba(0, 0, 0, .4)
    }

    .btn-primary:disabled {
      opacity: .5;
      cursor: default;
      transform: none
    }

    .signup-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: rgba(255, 255, 255, .3)
    }

    .signup-link a {
      color: rgba(0, 162, 255, .7);
      font-weight: 600;
      text-decoration: none
    }

    .signup-link a:hover {
      color: #00d2ff
    }

    /* loading dots */
    .dots::after {
      content: '';
      animation: dots 1.2s infinite
    }

    @keyframes dots {
      0% {
        content: ''
      }

      33% {
        content: '.'
      }

      66% {
        content: '..'
      }

      100% {
        content: '...'
      }
    }
  </style>
</head>

<body>
  <div class="bg-grid"></div>

  <div class="card">
    <div class="logo-wrap">
      <div class="logo-icon">&#128737;</div>
      <div class="logo-title">S PSICOS</div>
      <div class="logo-sub">Plataforma de Saúde Ocupacional · IA Engine</div>
    </div>

    <!-- Seleção de perfil -->
    <div class="role-tabs">
      <div class="role-tab active" onclick="setRole('rh',this)" title="Perfil RH">
        <span class="r-icon">&#127970;</span> RH
      </div>
      <div class="role-tab" onclick="setRole('consultor',this)" title="Perfil Consultor">
        <span class="r-icon">&#129504;</span> Consultor
      </div>
      <div class="role-tab" onclick="setRole('admin',this)" title="Perfil Admin">
        <span class="r-icon">&#9881;</span> Admin
      </div>
    </div>

    <div class="msg" id="msg"></div>

    <form id="loginForm">
      <div class="field">
        <label>E-mail</label>
        <div class="input-wrap">
          <svg class="input-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
            viewBox="0 0 24 24">
            <rect x="2" y="4" width="20" height="16" rx="2" />
            <path d="m2 7 10 7 10-7" />
          </svg>
          <input type="email" id="email" placeholder="usuario@empresa.com.br" required autocomplete="email">
        </div>
      </div>
      <div class="field">
        <label>Senha</label>
        <div class="input-wrap">
          <svg class="input-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
            viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <input type="password" id="password" placeholder="Sua senha" required autocomplete="current-password">
          <button type="button" class="toggle-pw" onclick="togglePw()" title="Mostrar/ocultar senha">&#128065;</button>
        </div>
      </div>
      <div class="forgot"><a href="#">Esqueci minha senha</a></div>
      <button type="submit" class="btn-primary" id="btn-login">&#9889; ENTRAR</button>
    </form>

    <p class="signup-link">Não tem conta? <a href="/signup">Criar conta</a> &nbsp;|&nbsp; <a
        href="/cadastro-empresa">Cadastrar empresa</a></p>
  </div>

  <script>
    let currentRole = 'rh';

    function setRole(role, el) {
      currentRole = role;
      document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    }

    function togglePw() {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    }

    // Gera partículas de fundo
    (function () {
      for (let i = 0; i < 12; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 4 + 2;
        p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random() * 100}%;animation-duration:${8 + Math.random() * 12}s;animation-delay:${Math.random() * 10}s;opacity:${0.1 + Math.random() * 0.15}`;
        document.body.appendChild(p);
      }
    })();

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const msg = document.getElementById('msg');
      btn.innerHTML = '<span class="dots">Verificando</span>';
      btn.disabled = true;
      msg.style.display = 'none';

      const fd = new FormData();
      fd.append('email', document.getElementById('email').value.trim());
      fd.append('password', document.getElementById('password').value);
      fd.append('role', currentRole);

      try {
        const res = await fetch('/api/auth/login', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.success) {
          msg.className = 'msg success';
          msg.style.display = 'block';
          msg.textContent = '&#10003; Acesso autorizado! Redirecionando...';
          setTimeout(() => window.location.href = data.redirect || '/dashboard', 900);
        } else {
          msg.className = 'msg error';
          msg.style.display = 'block';
          msg.textContent = '&#10007; ' + (data.message || 'Credenciais inválidas.');
          btn.innerHTML = '&#9889; ENTRAR';
          btn.disabled = false;
        }
      } catch (err) {
        msg.className = 'msg error';
        msg.style.display = 'block';
        msg.textContent = '&#10007; Erro de conexão. Tente novamente.';
        btn.innerHTML = '&#9889; ENTRAR';
        btn.disabled = false;
      }
    });
  </script>
</body>

</html>
