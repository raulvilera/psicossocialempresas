<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Criar Conta — S Psicos</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000000;
      overflow-y: auto;
      padding: 20px;
      background-image: radial-gradient(ellipse at 80% 30%, rgba(0, 114, 255, .07) 0%, transparent 55%), radial-gradient(ellipse at 20% 70%, rgba(0, 162, 255, .05) 0%, transparent 45%)
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(0, 162, 255, .025) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 162, 255, .025) 1px, transparent 1px);
      background-size: 44px 44px
    }

    .card {
      position: relative;
      z-index: 1;
      background: linear-gradient(145deg, #050c1a, #0a1020);
      border: 1px solid rgba(0, 162, 255, .15);
      border-radius: 24px;
      padding: 44px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 0 60px rgba(0, 114, 255, .08), 0 30px 60px rgba(0, 0, 0, .6), inset 0 1px 0 rgba(0, 162, 255, .1);
      animation: up .45s ease both
    }

    @keyframes up {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 30px
    }

    .logo-icon {
      width: 68px;
      height: 68px;
      background: linear-gradient(135deg, #001020, #001f3f);
      border: 2px solid rgba(0, 162, 255, .3);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 14px;
      box-shadow: 0 0 20px rgba(0, 114, 255, .12)
    }

    .logo-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1.5px
    }

    .logo-sub {
      color: rgba(0, 162, 255, .5);
      font-size: 12px;
      margin-top: 3px
    }

    .field {
      margin-bottom: 15px
    }

    label {
      font-size: 11px;
      font-weight: 700;
      color: rgba(0, 162, 255, .65);
      display: block;
      margin-bottom: 6px;
      letter-spacing: 1px;
      text-transform: uppercase
    }

    .iw {
      position: relative;
      background: rgba(0, 0, 0, .4);
      border: 1px solid rgba(0, 162, 255, .18);
      border-radius: 11px;
      display: flex;
      align-items: center;
      transition: border-color .2s, box-shadow .2s
    }

    .iw:focus-within {
      border-color: rgba(0, 162, 255, .45);
      box-shadow: 0 0 0 3px rgba(0, 162, 255, .06)
    }

    .iw-icon {
      position: absolute;
      left: 13px;
      color: rgba(0, 162, 255, .35)
    }

    .iw input,
    .iw select {
      width: 100%;
      padding: 13px 14px 13px 42px;
      background: transparent;
      border: none;
      outline: none;
      font-size: 14px;
      color: #fff;
      font-family: 'DM Sans', sans-serif
    }

    .iw input::placeholder {
      color: rgba(255, 255, 255, .18)
    }

    .iw select option {
      background: #020510;
      color: #fff
    }

    .msg {
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 14px;
      display: none
    }

    .msg.error {
      background: rgba(200, 0, 0, .2);
      color: #ff6060;
      border: 1px solid rgba(200, 0, 0, .3)
    }

    .msg.success {
      background: rgba(0, 114, 255, .15);
      color: #00d2ff;
      border: 1px solid rgba(0, 114, 255, .3)
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #001f3f, #004c99, #0072ff);
      color: #00d2ff;
      border: 1px solid rgba(0, 162, 255, .4);
      border-radius: 13px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 2px;
      text-transform: uppercase;
      box-shadow: 0 4px 20px rgba(0, 114, 255, .3), inset 0 1px 0 rgba(0, 162, 255, .2);
      transition: all .2s;
      margin-top: 4px
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 114, 255, .45);
      color: #fff
    }

    .btn:active {
      transform: translateY(1px)
    }

    .btn:disabled {
      opacity: .5;
      cursor: default;
      transform: none
    }

    .link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: rgba(255, 255, 255, .3)
    }

    .link a {
      color: rgba(0, 162, 255, .7);
      font-weight: 600;
      text-decoration: none
    }

    .link a:hover {
      color: #00d2ff
    }
  </style>
</head>

<body>
  <div class="bg-grid"></div>
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-icon">&#128737;</div>
      <div class="logo-title">CRIAR CONTA</div>
      <div class="logo-sub">Acesso à plataforma S Psicos</div>
    </div>
    <div class="msg" id="msg"></div>
    <form id="form">
      <div class="field">
        <label>Nome Completo</label>
        <div class="iw">
          <svg class="iw-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
            viewBox="0 0 24 24">
            <circle cx="12" cy="7" r="4" />
            <path d="M5.5 21a8.38 8.38 0 0 1 13 0" />
          </svg>
          <input type="text" id="nome" placeholder="Seu nome completo" required>
        </div>
      </div>
      <div class="field">
        <label>E-mail Corporativo</label>
        <div class="iw">
          <svg class="iw-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
            viewBox="0 0 24 24">
            <rect x="2" y="4" width="20" height="16" rx="2" />
            <path d="m2 7 10 7 10-7" />
          </svg>
          <input type="email" id="email" placeholder="seu@empresa.com.br" required>
        </div>
      </div>
      <div class="field">
        <label>Senha</label>
        <div class="iw">
          <svg class="iw-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
            viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <input type="password" id="password" placeholder="Mínimo 8 caracteres" required>
        </div>
      </div>
      <div class="field">
        <label>ID da Empresa</label>
        <div class="iw">
          <svg class="iw-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
            viewBox="0 0 24 24">
            <rect x="2" y="7" width="20" height="15" rx="2" />
            <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" />
          </svg>
          <input type="number" id="empresa_id" placeholder="Ex: 1" required min="1">
        </div>
      </div>
      <button type="submit" class="btn" id="btn-cad">&#9889; CADASTRAR</button>
    </form>
    <p class="link">Já tem conta? <a href="/login">Fazer login</a></p>
  </div>
  <script>
    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('btn-cad');
      const msg = document.getElementById('msg');
      btn.textContent = 'PROCESSANDO...'; btn.disabled = true;
      const fd = new FormData();
      ['nome', 'email', 'password', 'empresa_id'].forEach(id => fd.append(id, document.getElementById(id).value));
      try {
        const res = await fetch('/api/auth/signup', { method: 'POST', body: fd });
        const data = await res.json();
        msg.style.display = 'block';
        if (data.success) {
          msg.className = 'msg success'; msg.textContent = '&#10003; ' + data.message;
          setTimeout(() => window.location.href = '/login', 2000);
        } else {
          msg.className = 'msg error'; msg.textContent = '&#10007; ' + (data.message || 'Erro.');
          btn.textContent = '&#9889; CADASTRAR'; btn.disabled = false;
        }
      } catch {
        msg.className = 'msg error'; msg.style.display = 'block'; msg.textContent = '&#10007; Erro de conexão.';
        btn.textContent = '&#9889; CADASTRAR'; btn.disabled = false;
      }
    });
  </script>
</body>

</html>
