<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar Empresa — Psicos</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    /* scrollbar customizada azul */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px
    }

    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.3)
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 119, 255, 0.5);
      border-radius: 4px;
      border: 2px solid #010409
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 204, 255, 0.8)
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #010409;
      background-image: radial-gradient(ellipse at 80% 50%, rgba(0, 120, 255, 0.07) 0%, transparent 60%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(0, 120, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 120, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none
    }

    .card {
      position: relative;
      background: linear-gradient(145deg, #040812, #060c18);
      border: 1px solid rgba(0, 120, 255, 0.15);
      border-radius: 24px;
      padding: 44px 40px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 0 60px rgba(0, 120, 255, 0.08), 0 30px 60px rgba(0, 0, 0, 0.6);
      z-index: 1
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px
    }

    .logo-icon {
      width: 68px;
      height: 68px;
      background: linear-gradient(135deg, #011a33, #022a55);
      border: 2px solid rgba(0, 120, 255, 0.3);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 14px
    }

    h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px
    }

    .field {
      margin-bottom: 14px
    }

    label {
      font-size: 11px;
      font-weight: 600;
      color: rgba(0, 120, 255, 0.6);
      display: block;
      margin-bottom: 6px;
      letter-spacing: 1px;
      text-transform: uppercase
    }

    .iw {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(0, 120, 255, 0.2);
      border-radius: 11px
    }

    .iw input {
      width: 100%;
      padding: 13px 14px;
      background: transparent;
      border: none;
      outline: none;
      font-size: 14px;
      color: #e0f0ff;
      font-family: 'DM Sans', sans-serif
    }

    .iw input::placeholder {
      color: rgba(255, 255, 255, 0.2)
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #001a33, #003d7a, #0077ff);
      color: #00ccff;
      border: 1px solid rgba(0, 120, 255, 0.4);
      border-radius: 13px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 2px;
      text-transform: uppercase;
      box-shadow: 0 4px 20px rgba(0, 100, 220, 0.3), inset 0 1px 0 rgba(0, 120, 255, 0.2);
      transition: all .15s;
      margin-top: 4px
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 30px rgba(0, 100, 220, 0.5);
      color: #fff
    }

    .btn:active {
      transform: translateY(1px);
      box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.5)
    }

    .link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.3)
    }

    .link a {
      color: rgba(0, 120, 255, 0.6);
      font-weight: 600;
      text-decoration: none
    }

    .msg {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 14px;
      display: none
    }

    .msg.error {
      background: rgba(200, 0, 0, 0.2);
      color: #ff6060;
      border: 1px solid rgba(200, 0, 0, 0.3)
    }

    .msg.success {
      background: rgba(0, 100, 220, 0.15);
      color: #00ccff;
      border: 1px solid rgba(0, 100, 220, 0.3)
    }
  </style>
</head>

<body>
  <div class="bg-grid"></div>
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-icon">🏢</div>
      <h1>CADASTRAR EMPRESA</h1>
    </div>
    <div class="msg" id="msg"></div>
    <form id="form">
      <div class="field"><label>CNPJ</label>
        <div class="iw"><input type="text" id="cnpj" placeholder="00.000.000/0000-00" required></div>
      </div>
      <div class="field"><label>Nome da Empresa</label>
        <div class="iw"><input type="text" id="nome" placeholder="Razão Social" required></div>
      </div>
      <div class="field"><label>Telefone</label>
        <div class="iw"><input type="text" id="telefone" placeholder="(11) 99999-9999" required></div>
      </div>
      <div class="field"><label>Responsável</label>
        <div class="iw"><input type="text" id="responsavel" placeholder="Nome do responsável" required></div>
      </div>
      <div class="field"><label>Número de Colaboradores</label>
        <div class="iw"><input type="number" id="colaboradores" placeholder="50" required></div>
      </div>
      <div class="field"><label>Setor Principal</label>
        <div class="iw"><input type="text" id="setores" placeholder="Ex: Produção, Logística" required></div>
      </div>
      <button type="submit" class="btn">⚡ CADASTRAR EMPRESA</button>
    </form>
    <p class="link"><a href="/dashboard">← Voltar ao Dashboard</a></p>
  </div>
  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault(); const btn = e.target.querySelector('button'); btn.textContent = 'PROCESSANDO...'; btn.disabled = true;
      const fd = new FormData();
      ['cnpj', 'nome', 'telefone', 'responsavel', 'colaboradores', 'setores'].forEach(id => fd.append(id, document.getElementById(id).value));
      // Repassar empresa_id se existir na URL
      const params = new URLSearchParams(window.location.search);
      if (params.get('empresa_id')) fd.append('empresa_id', params.get('empresa_id'));
      const res = await fetch('/api/empresa/registrar', { method: 'POST', body: fd });
      const data = await res.json(); const msg = document.getElementById('msg'); msg.style.display = 'block';
      if (data.success) {
        msg.className = 'msg success'; msg.textContent = '✓ Dados salvos! Preparando sua recomendação de plano...';
        const nome = document.getElementById('nome').value;
        const colab = document.getElementById('colaboradores').value;
        const setores = encodeURIComponent(document.getElementById('setores').value);
        const eid = data.empresa_id || params.get('empresa_id') || '';
        setTimeout(() => window.location.href = `/planos?nome=${encodeURIComponent(nome)}&colaboradores=${colab}&setores=${setores}&empresa_id=${eid}`, 1200);
      } else { msg.className = 'msg error'; msg.textContent = '✗ ' + (data.message || 'Erro.'); btn.textContent = '⚡ CADASTRAR EMPRESA'; btn.disabled = false }
    });
  </script>
</body>

</html>
