<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta — Psicos</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #010409;
      background-image: radial-gradient(ellipse at 20% 50%, rgba(0, 120, 255, 0.08) 0%, transparent 60%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(0, 120, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 120, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none
    }

    .card {
      position: relative;
      background: linear-gradient(145deg, #040812, #060c18);
      border: 1px solid rgba(0, 120, 255, 0.15);
      border-radius: 24px;
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 60px rgba(0, 120, 255, 0.08), 0 30px 60px rgba(0, 0, 0, 0.6);
      z-index: 1
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px
    }

    .logo-icon {
      width: 68px;
      height: 68px;
      background: linear-gradient(135deg, #011a33, #022a55);
      border: 2px solid rgba(0, 120, 255, 0.3);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 14px
    }

    h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px
    }

    .field {
      margin-bottom: 14px
    }

    label {
      font-size: 11px;
      font-weight: 600;
      color: rgba(0, 120, 255, 0.6);
      display: block;
      margin-bottom: 6px;
      letter-spacing: 1px;
      text-transform: uppercase
    }

    .iw {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(0, 120, 255, 0.2);
      border-radius: 11px
    }

    .iw input {
      width: 100%;
      padding: 13px 14px;
      background: transparent;
      border: none;
      outline: none;
      font-size: 14px;
      color: #e0f0ff;
      font-family: 'DM Sans', sans-serif
    }

    .iw input::placeholder {
      color: rgba(255, 255, 255, 0.2)
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #001a33, #003d7a, #0077ff);
      color: #00ccff;
      border: 1px solid rgba(0, 120, 255, 0.4);
      border-radius: 13px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 2px;
      text-transform: uppercase;
      box-shadow: 0 4px 20px rgba(0, 100, 220, 0.3), inset 0 1px 0 rgba(0, 120, 255, 0.2);
      transition: all .15s;
      margin-top: 4px
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 30px rgba(0, 100, 220, 0.5);
      color: #fff
    }

    .btn:active {
      transform: translateY(1px);
      box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.5)
    }

    .link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.3)
    }

    .link a {
      color: rgba(0, 120, 255, 0.6);
      font-weight: 600;
      text-decoration: none
    }

    .msg {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 14px;
      display: none
    }

    .msg.error {
      background: rgba(200, 0, 0, 0.2);
      color: #ff6060;
      border: 1px solid rgba(200, 0, 0, 0.3)
    }

    .msg.success {
      background: rgba(0, 100, 220, 0.15);
      color: #00ccff;
      border: 1px solid rgba(0, 100, 220, 0.3)
    }

    @media (max-width:768px) {

      .container,
      .form-card,
      .plans-grid {
        padding: 16px !important;
        max-width: 100% !important
      }

      .grid-2,
      .grid-3,
      .plans-grid {
        grid-template-columns: 1fr !important
      }

      input,
      select {
        font-size: 16px !important
      }
    }

    @media (max-width:480px) {

      h1,
      h2 {
        font-size: 20px !important
      }

      .btn,
      .btn-primary,
      .btn-cta {
        width: 100%
      }
    }

    /* MODAL SETORES */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      display: none;
      backdrop-filter: blur(4px);
    }

    .modal-card {
      background: #060c18;
      border: 1px solid rgba(0, 120, 255, 0.3);
      border-radius: 20px;
      padding: 30px;
      width: 95%;
      max-width: 500px;
      box-shadow: 0 0 50px rgba(0, 120, 255, 0.2);
    }

    .sector-row {
      display: grid;
      grid-template-columns: 1fr 100px 40px;
      gap: 10px;
      margin-bottom: 10px;
    }

    .btn-add {
      background: rgba(0, 255, 100, 0.1);
      color: #00ff66;
      border: 1px solid rgba(0, 255, 100, 0.3);
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      margin-top: 10px;
    }

    .btn-remove {
      background: rgba(255, 0, 0, 0.1);
      color: #ff4444;
      border: 1px solid rgba(255, 0, 0, 0.3);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .readonly-field {
      background: rgba(0, 120, 255, 0.05) !important;
      color: #00ccff !important;
      cursor: not-allowed;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="bg-grid"></div>
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-icon">🛡️</div>
      <h1>CRIAR CONTA</h1>
    </div>
    <div class="msg" id="msg"></div>
    <form id="form">
      <div class="field"><label>Nome da Empresa</label>
        <div class="iw"><input type="text" id="nome" placeholder="Ex: Psicos Ltda" required></div>
      </div>
      <div class="field"><label>E-mail Corporativo</label>
        <div class="iw"><input type="email" id="email" placeholder="seu@empresa.com" required></div>
      </div>
      <div class="field"><label>Senha de Acesso</label>
        <div class="iw"><input type="password" id="password" placeholder="••••••••" required></div>
      </div>
      <div class="field"><label>ID da Empresa (Automático)</label>
        <div class="iw"><input type="number" id="empresa_id" class="readonly-field" readonly required></div>
      </div>
      <div class="field"><label>Setor(es) e Funcionários</label>
        <div class="iw" onclick="openSectors()"><input type="text" id="setores_display"
            placeholder="Clique para definir setores..." readonly style="cursor: pointer;"></div>
      </div>
      <button type="submit" class="btn">⚡ CADASTRAR</button>
    </form>

    <div id="modal-setores" class="modal">
      <div class="modal-card">
        <h2 style="color:#fff; font-family:'Rajdhani'; margin-bottom:20px;">Configurar Setores</h2>
        <div id="sector-list">
          <!-- Rows will be added here -->
          <div class="sector-row">
            <div class="iw"><input type="text" placeholder="Setor (ex: Produção)" class="s-name"></div>
            <div class="iw"><input type="number" placeholder="Nº Func" class="s-count"></div>
            <div></div>
          </div>
        </div>
        <button type="button" class="btn-add" onclick="addSectorRow()">+ Adicionar Setor</button>
        <div style="display:flex; gap:10px; margin-top:25px;">
          <button type="button" class="btn" style="background:#111; border-color:#333; color:#888;"
            onclick="closeSectors()">Cancelar</button>
          <button type="button" class="btn" onclick="saveSectors()">Confirmar</button>
        </div>
      </div>
    </div>
    <p class="link">Já tem conta? <a href="/login">Fazer login</a></p>
  </div>
  <script>
    let sectorsData = [];

    // Busca próximo ID ao carregar
    window.addEventListener('load', async () => {
      try {
        const res = await fetch('/api/auth/next-empresa-id');
        const data = await res.json();
        if (data.success) document.getElementById('empresa_id').value = data.next_id;
      } catch (e) { document.getElementById('empresa_id').value = 1; }
    });

    function openSectors() { document.getElementById('modal-setores').style.display = 'flex'; }
    function closeSectors() { document.getElementById('modal-setores').style.display = 'none'; }

    function addSectorRow() {
      const row = document.createElement('div');
      row.className = 'sector-row';
      row.innerHTML = `
        <div class="iw"><input type="text" placeholder="Setor" class="s-name"></div>
        <div class="iw"><input type="number" placeholder="Qtd" class="s-count"></div>
        <button type="button" class="btn-remove" onclick="this.parentElement.remove()">×</button>
      `;
      document.getElementById('sector-list').appendChild(row);
    }

    function saveSectors() {
      const rows = document.querySelectorAll('.sector-row');
      sectorsData = [];
      let display = [];
      rows.forEach(r => {
        const name = r.querySelector('.s-name').value;
        const count = r.querySelector('.s-count').value;
        if (name && count) {
          sectorsData.push({ setor: name, funcionarios: count });
          display.push(`${name}(${count})`);
        }
      });
      document.getElementById('setores_display').value = display.join(', ');
      closeSectors();
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.textContent = 'PROCESSANDO...';
      btn.disabled = true;

      const fd = new FormData();
      fd.append('nome', document.getElementById('nome').value);
      fd.append('email', document.getElementById('email').value);
      fd.append('password', document.getElementById('password').value);
      fd.append('empresa_id', document.getElementById('empresa_id').value);
      fd.append('setores_data', JSON.stringify(sectorsData));

      const res = await fetch('/api/auth/signup', { method: 'POST', body: fd });
      const data = await res.json();
      const msg = document.getElementById('msg');
      msg.style.display = 'block';

      if (data.success) {
        msg.className = 'msg success';
        msg.textContent = '✓ ' + data.message;
        setTimeout(() => window.location.href = '/login', 2000)
      } else {
        msg.className = 'msg error';
        msg.textContent = '✗ ' + (data.message || 'Erro.');
        btn.textContent = '⚡ CADASTRAR';
        btn.disabled = false
      }
    });
  </script>
</body>

</html>
