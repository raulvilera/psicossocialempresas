<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Psicos</title>
  <meta name="theme-color" content="#0077ff">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/app_icon.png">
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #010409;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(0, 120, 255, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(0, 100, 220, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(0, 80, 180, 0.05) 0%, transparent 40%);
      overflow: hidden;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(0, 120, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 120, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .card {
      position: relative;
      background: linear-gradient(145deg, #040812, #060c18);
      border: 1px solid rgba(0, 120, 255, 0.15);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 430px;
      box-shadow: 0 0 60px rgba(0, 120, 255, 0.08), 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(0, 120, 255, 0.1);
      z-index: 1;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 25px;
      background: linear-gradient(135deg, rgba(0, 120, 255, 0.2), transparent, rgba(0, 100, 220, 0.1));
      z-index: -1;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px
    }

    .logo-icon {
      width: 76px;
      height: 76px;
      background: linear-gradient(135deg, #011a33, #022a55);
      border: 2px solid rgba(0, 120, 255, 0.3);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin-bottom: 16px;
      box-shadow: 0 0 20px rgba(0, 120, 255, 0.15), inset 0 1px 0 rgba(0, 120, 255, 0.1);
    }

    h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px
    }

    .subtitle {
      color: rgba(0, 120, 255, 0.6);
      font-size: 13px;
      margin-top: 4px;
      text-align: center;
      letter-spacing: 0.5px
    }

    .field {
      margin-bottom: 18px
    }

    label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(0, 120, 255, 0.7);
      display: block;
      margin-bottom: 7px;
      letter-spacing: 1px;
      text-transform: uppercase
    }

    .input-wrap {
      position: relative;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(0, 120, 255, 0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      transition: border-color .2s, box-shadow .2s;
    }

    .input-wrap:focus-within {
      border-color: rgba(0, 120, 255, 0.5);
      box-shadow: 0 0 0 3px rgba(0, 120, 255, 0.08), 0 0 15px rgba(0, 120, 255, 0.1);
    }

    .input-icon {
      position: absolute;
      left: 14px;
      color: rgba(0, 120, 255, 0.4)
    }

    .input-wrap input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      background: transparent;
      border: none;
      outline: none;
      font-size: 15px;
      color: #e0f0ff;
      font-family: 'DM Sans', sans-serif;
    }

    .input-wrap input::placeholder {
      color: rgba(255, 255, 255, 0.2)
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      cursor: pointer;
      color: rgba(0, 120, 255, 0.4);
      background: none;
      border: none;
      font-size: 16px
    }

    .forgot {
      text-align: right;
      margin-top: 6px;
      margin-bottom: 22px
    }

    .forgot a {
      color: rgba(0, 120, 255, 0.6);
      font-size: 12px;
      text-decoration: none;
      letter-spacing: 0.5px;
      transition: color .2s
    }

    .forgot a:hover {
      color: #00ccff
    }

    .btn-primary {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #001a33, #003d7a, #0077ff);
      background-size: 200% 200%;
      color: #00ccff;
      border: 1px solid rgba(0, 120, 255, 0.4);
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all .3s;
      box-shadow: 0 4px 20px rgba(0, 100, 220, 0.3), 0 2px 4px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(0, 120, 255, 0.2);
      position: relative;
      overflow: hidden;
    }

    .btn-primary:hover {
      background-position: right center;
      box-shadow: 0 6px 30px rgba(0, 100, 220, 0.5), 0 2px 4px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(0, 120, 255, 0.3);
      transform: translateY(-1px);
      color: #fff;
    }

    .btn-primary:active {
      transform: translateY(1px);
      box-shadow: 0 2px 10px rgba(0, 100, 220, 0.3), inset 0 2px 4px rgba(0, 0, 0, 0.4)
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0
    }

    .divider span {
      flex: 1;
      height: 1px;
      background: rgba(0, 255, 80, 0.1)
    }

    .divider p {
      color: rgba(0, 120, 255, 0.3);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px
    }

    .social-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    .btn-social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(0, 120, 255, 0.15);
      background: rgba(0, 0, 0, 0.3);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.6);
      transition: all .2s;
      font-family: 'DM Sans', sans-serif;
    }

    .btn-social:hover {
      border-color: rgba(0, 120, 255, 0.3);
      color: #fff;
      background: rgba(0, 20, 40, 0.4)
    }

    .signup-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.3)
    }

    .signup-link a {
      color: rgba(0, 120, 255, 0.7);
      font-weight: 600;
      text-decoration: none
    }

    .signup-link a:hover {
      color: #00ccff
    }

    .msg {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      display: none
    }

    .msg.error {
      background: rgba(200, 0, 0, 0.2);
      color: #ff6060;
      border: 1px solid rgba(200, 0, 0, 0.3)
    }

    .msg.success {
      background: rgba(0, 100, 220, 0.15);
      color: #00ccff;
      border: 1px solid rgba(0, 100, 220, 0.3)
    }

    @media (max-width: 480px) {
      .card {
        padding: 32px 20px;
        border-radius: 16px;
        margin: 16px
      }

      h1 {
        font-size: 22px
      }

      .btn-primary {
        font-size: 14px;
        padding: 13px
      }

      .social-btns {
        grid-template-columns: 1fr
      }
    }
  </style>
</head>

<body>
  <div class="bg-grid"></div>
  <div class="card">
    <div class="logo-wrap">
      <h1>PSICOS</h1>
      <p class="subtitle">Bem-vindo. Entre com suas credenciais.</p>
    </div>
    <div class="msg" id="msg"></div>
    <form id="loginForm">
      <div class="field">
        <label>E-mail</label>
        <div class="input-wrap">
          <svg class="input-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
            viewBox="0 0 24 24">
            <rect x="2" y="4" width="20" height="16" rx="2" />
            <path d="m2 7 10 7 10-7" />
          </svg>
          <input type="email" id="email" placeholder="exemplo@empresa.com" required>
        </div>
      </div>
      <div class="field">
        <label>Senha</label>
        <div class="input-wrap">
          <svg class="input-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
            viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <input type="password" id="password" placeholder="Sua senha secreta" required>
          <button type="button" class="toggle-pw" onclick="togglePw()">👁</button>
        </div>
      </div>
      <div class="forgot"><a href="#">Esqueci minha senha</a></div>
      <button type="submit" class="btn-primary">ENTRAR</button>
    </form>
    <p class="signup-link">Não tem uma conta? <a href="/signup">Criar conta</a></p>
    <div id="installContainer" style="display:none; text-align:center; margin-top:15px;">
      <button onclick="installPWA()"
        style="background:transparent; border:1px solid #00ccff; color:#00ccff; padding:8px 15px; border-radius:10px; font-size:12px; cursor:pointer; font-weight:700;">
        📲 INSTALAR APLICATIVO (VERSÃO APP)
      </button>
    </div>
  </div>
  <script>
    function togglePw() { const pw = document.getElementById('password'); pw.type = pw.type === 'password' ? 'text' : 'password' }

    function showComingSoon(provider) {
      const toast = document.getElementById('toast-social');
      document.getElementById('toast-social-text').textContent = `Login com ${provider} estará disponível em breve!`;
      toast.style.display = 'block';
      toast.style.animation = 'none';
      toast.offsetHeight; // reflow
      toast.style.animation = 'fadeToast .3s ease';
      clearTimeout(window._toastTimer);
      window._toastTimer = setTimeout(() => { toast.style.display = 'none' }, 3000);
    }
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installContainer').style.display = 'block';
    });

    async function installPWA() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          document.getElementById('installContainer').style.display = 'none';
        }
        deferredPrompt = null;
      }
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW Registered', reg))
          .catch(err => console.log('SW Error', err));
      });
    }
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      btn.textContent = 'VERIFICANDO...'; btn.disabled = true;
      const fd = new FormData();
      fd.append('email', document.getElementById('email').value);
      fd.append('password', document.getElementById('password').value);
      const res = await fetch('/api/auth/login', { method: 'POST', body: fd });
      const data = await res.json();
      const msg = document.getElementById('msg');
      if (data.success) {
        msg.className = 'msg success'; msg.style.display = 'block';
        msg.textContent = '✓ Acesso autorizado! Redirecionando...';
        setTimeout(() => window.location.href = data.redirect || '/dashboard', 1000);
      } else {
        msg.className = 'msg error'; msg.style.display = 'block';
        msg.textContent = '✗ ' + (data.message || 'Credenciais inválidas.');
        btn.textContent = 'ENTRAR'; btn.disabled = false;
      }
    });
  </script>
</body>

</html>
