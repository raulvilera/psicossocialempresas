<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Psicos</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #010409;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(0, 120, 255, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(0, 100, 220, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(0, 80, 180, 0.05) 0%, transparent 40%);
      overflow: hidden;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(0, 120, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 120, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .card {
      position: relative;
      background: linear-gradient(145deg, #040812, #060c18);
      border: 1px solid rgba(0, 120, 255, 0.15);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 430px;
      box-shadow: 0 0 60px rgba(0, 120, 255, 0.08), 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(0, 120, 255, 0.1);
      z-index: 1;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 25px;
      background: linear-gradient(135deg, rgba(0, 120, 255, 0.2), transparent, rgba(0, 100, 220, 0.1));
      z-index: -1;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px
    }

    .logo-icon {
      width: 76px;
      height: 76px;
      background: linear-gradient(135deg, #011a33, #022a55);
      border: 2px solid rgba(0, 120, 255, 0.3);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin-bottom: 16px;
      box-shadow: 0 0 20px rgba(0, 120, 255, 0.15), inset 0 1px 0 rgba(0, 120, 255, 0.1);
    }

    h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px
    }

    .subtitle {
      color: rgba(0, 120, 255, 0.6);
      font-size: 13px;
      margin-top: 4px;
      text-align: center;
      letter-spacing: 0.5px
    }

    .field {
      margin-bottom: 18px
    }

    label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(0, 120, 255, 0.7);
      display: block;
      margin-bottom: 7px;
      letter-spacing: 1px;
      text-transform: uppercase
    }

    .input-wrap {
      position: relative;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(0, 120, 255, 0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      transition: border-color .2s, box-shadow .2s;
    }

    .input-wrap:focus-within {
      border-color: rgba(0, 120, 255, 0.5);
      box-shadow: 0 0 0 3px rgba(0, 120, 255, 0.08), 0 0 15px rgba(0, 120, 255, 0.1);
    }

    .input-icon {
      position: absolute;
      left: 14px;
      color: rgba(0, 120, 255, 0.4)
    }

    .input-wrap input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      background: transparent;
      border: none;
      outline: none;
      font-size: 15px;
      color: #e0f0ff;
      font-family: 'DM Sans', sans-serif;
    }

    .input-wrap input::placeholder {
      color: rgba(255, 255, 255, 0.2)
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      cursor: pointer;
      color: rgba(0, 120, 255, 0.4);
      background: none;
      border: none;
      font-size: 16px
    }

    .forgot {
      text-align: right;
      margin-top: 6px;
      margin-bottom: 22px
    }

    .forgot a {
      color: rgba(0, 120, 255, 0.6);
      font-size: 12px;
      text-decoration: none;
      letter-spacing: 0.5px;
      transition: color .2s
    }

    .forgot a:hover {
      color: #00ccff
    }

    .btn-primary {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #001a33, #003d7a, #0077ff);
      background-size: 200% 200%;
      color: #00ccff;
      border: 1px solid rgba(0, 120, 255, 0.4);
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all .3s;
      box-shadow: 0 4px 20px rgba(0, 100, 220, 0.3), 0 2px 4px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(0, 120, 255, 0.2);
      position: relative;
      overflow: hidden;
    }

    .btn-primary:hover {
      background-position: right center;
      box-shadow: 0 6px 30px rgba(0, 100, 220, 0.5), 0 2px 4px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(0, 120, 255, 0.3);
      transform: translateY(-1px);
      color: #fff;
    }

    .btn-primary:active {
      transform: translateY(1px);
      box-shadow: 0 2px 10px rgba(0, 100, 220, 0.3), inset 0 2px 4px rgba(0, 0, 0, 0.4)
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0
    }

    .divider span {
      flex: 1;
      height: 1px;
      background: rgba(0, 255, 80, 0.1)
    }

    .divider p {
      color: rgba(0, 120, 255, 0.3);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px
    }

    .social-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    .btn-social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(0, 120, 255, 0.15);
      background: rgba(0, 0, 0, 0.3);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.6);
      transition: all .2s;
      font-family: 'DM Sans', sans-serif;
    }

    .btn-social:hover {
      border-color: rgba(0, 120, 255, 0.3);
      color: #fff;
      background: rgba(0, 20, 40, 0.4)
    }

    .signup-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.3)
    }

    .signup-link a {
      color: rgba(0, 120, 255, 0.7);
      font-weight: 600;
      text-decoration: none
    }

    .signup-link a:hover {
      color: #00ccff
    }

    .msg {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      display: none
    }

    .msg.error {
      background: rgba(200, 0, 0, 0.2);
      color: #ff6060;
      border: 1px solid rgba(200, 0, 0, 0.3)
    }

    .msg.success {
      background: rgba(0, 100, 220, 0.15);
      color: #00ccff;
      border: 1px solid rgba(0, 100, 220, 0.3)
    }
  </style>
</head>

<body>
  <div class="bg-grid"></div>
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-icon">🛡️</div>
      <h1>LOGIN DE ACESSO v3.3.0</h1>
      <p class="subtitle">Bem-vindo de volta. Entre com suas credenciais.</p>
    </div>
    <div class="msg" id="msg"></div>
    <form id="loginForm">
      <div class="field">
        <label>E-mail</label>
        <div class="input-wrap">
          <svg class="input-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
            viewBox="0 0 24 24">
            <rect x="2" y="4" width="20" height="16" rx="2" />
            <path d="m2 7 10 7 10-7" />
          </svg>
          <input type="email" id="email" placeholder="exemplo@empresa.com" required>
        </div>
      </div>
      <div class="field">
        <label>Senha</label>
        <div class="input-wrap">
          <svg class="input-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
            viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <input type="password" id="password" placeholder="Sua senha secreta" required>
          <button type="button" class="toggle-pw" onclick="togglePw()">👁</button>
        </div>
      </div>
      <div class="forgot"><a href="#">Esqueci minha senha</a></div>
      <button type="submit" class="btn-primary">⚡ ENTRAR</button>
    </form>
    <div class="divider"><span></span>
      <p>OU CONTINUE COM</p><span></span>
    </div>
    <!-- TOAST -->
    <div id="toast-social"
      style="display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#001a33,#003d7a);border:1px solid rgba(0,120,255,0.3);color:#00ccff;padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,0.5);text-align:center;min-width:300px">
      <div style="font-size:16px;margin-bottom:4px">🚧 Em Breve</div>
      <div id="toast-social-text">Login social em desenvolvimento</div>
      <div style="font-size:11px;color:rgba(0,120,255,0.5);margin-top:4px">Use e-mail e senha por enquanto</div>
    </div>

    <div class="social-btns">
      <button class="btn-social" onclick="showComingSoon('Google')">
        <svg width="16" height="16" viewBox="0 0 24 24">
          <path fill="#4285F4"
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
          <path fill="#34A853"
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
          <path fill="#FBBC05"
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
          <path fill="#EA4335"
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
        </svg>
        Google
      </button>
      <button class="btn-social" onclick="showComingSoon('Apple')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
          <path
            d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z" />
        </svg>
        Apple
      </button>
    </div>
    <p class="signup-link">Não tem uma conta? <a href="/signup">Criar conta</a></p>
  </div>
  <script>
    function togglePw() { const pw = document.getElementById('password'); pw.type = pw.type === 'password' ? 'text' : 'password' }

    function showComingSoon(provider) {
      const toast = document.getElementById('toast-social');
      document.getElementById('toast-social-text').textContent = `Login com ${provider} estará disponível em breve!`;
      toast.style.display = 'block';
      toast.style.animation = 'none';
      toast.offsetHeight; // reflow
      toast.style.animation = 'fadeToast .3s ease';
      clearTimeout(window._toastTimer);
      window._toastTimer = setTimeout(() => { toast.style.display = 'none' }, 3000);
    }
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      btn.textContent = 'VERIFICANDO...'; btn.disabled = true;
      const fd = new FormData();
      fd.append('email', document.getElementById('email').value);
      fd.append('password', document.getElementById('password').value);
      const res = await fetch('/api/auth/login', { method: 'POST', body: fd });
      const data = await res.json();
      const msg = document.getElementById('msg');
      if (data.success) {
        msg.className = 'msg success'; msg.style.display = 'block';
        msg.textContent = '✓ Acesso autorizado! Redirecionando...';
        setTimeout(() => window.location.href = data.redirect || '/dashboard', 1000);
      } else {
        msg.className = 'msg error'; msg.style.display = 'block';
        msg.textContent = '✗ ' + (data.message || 'Credenciais inválidas.');
        btn.textContent = '⚡ ENTRAR'; btn.disabled = false;
      }
    });
  </script>
</body>

</html>
